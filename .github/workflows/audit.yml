name: npm audit
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
permissions:
  contents: read
jobs:
  audit:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: npm audit (production deps, high+ severity)
      run: npm run audit:ci
